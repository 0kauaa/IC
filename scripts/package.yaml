name: ic-projeto-hs
version: 0.1.0.0
github: "0kauaa/IC"
license: MIT
author: "Kauã Santana"
maintainer: "kauassilva0023@gmail.com"
extra-source-files:
  - README.md

# biblioteca
library:
  source-dirs: src
  exposed-modules:
    - Cat
    - Learner
    - Params
  dependencies:
    - base >= 4.17 && < 5
  ghc-options: -Wall

# executáveis
executables:
  testes:
    main: Testes.hs
    source-dirs: src
    dependencies:
      - ic-projeto-hs
      - base
    ghc-options: -Wall